---

dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: almalinux-default
    image: almalinux:9
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: ansible.posix.profile_tasks
  inventory:
    host_vars:
      almalinux-default:
        user_namespace_username: "testuser"

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - destroy
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
