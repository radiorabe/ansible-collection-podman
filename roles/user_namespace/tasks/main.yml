---
# tasks file for radiorabe.podman.user_namespace

- name: "Create a user with a home directory if not existent: {{ user_namespace_username }}"
  ansible.builtin.include_role:
    name: radiorabe.common.local_user
  vars:
    local_user_username: "{{ user_namespace_username }}"
    local_user_create_home: "{{ user_namespace_create_home }}"
    local_user_groupname: "{{ user_namespace_groupname }}"
    local_user_home_directory: "{{ user_namespace_home_directory }}"
    local_user_shell: "{{ user_namespace_shell }}"
    local_user_system: "{{ user_namespace_system }}"

- name: "Check if subuid entries already exist for user: {{ user_namespace_username }}"
  ansible.builtin.command:
    cmd: "grep {{ user_namespace_username }} /etc/subuid"
  register: user_namespace_subuid_check
  changed_when: false
  failed_when: false
  become: true

- name: "Create a user namespace for user: {{ user_namespace_username }}"
  ansible.builtin.command:
    cmd: "usermod --add-subuids {{ user_namespace_subuid_range }} --add-subgids {{ user_namespace_subgid_range }} {{ user_namespace_username }}"
  become: true
  when: user_namespace_subuid_check.rc != 0
  changed_when: true
